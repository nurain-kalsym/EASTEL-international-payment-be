# ========================
# Server
# ========================
server.port=4000
server.servlet.context-path=/api
protocol.subdomain=http://localhost:4000

# ========================
# Database (in-memory H2 for test)
# ========================
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# ========================
# Logging
# ========================
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# ========================
# JWT / App Properties
# ========================
app.jwtCookieName=jwtCookieEkedai
app.jwtSecret=EkedaiLocalDevelopmentJwtSecretKeyThatIsDefinitelyLongerThanSixtyFourCharactersForHS512Signing
app.jwtExpirationMs=864000000
build.version=test

# ========================
# Assets
# ========================
image.assets.location=C:/tmp/test_assets

# ========================
# WSP / Dummy URLs
# ========================
wsp.username=test
wsp.password=test
wsp.getTokenUrl=http://localhost/mock/wsp/auth
wsp.billpaymenturl=http://localhost/mock/wsp/billPayment
wsp.topupurl=http://localhost/mock/wsp/submit
wsp.getvoucherurl=http://localhost/mock/wsp/voucher
wsp.getretailrate=http://localhost/mock/wsp/customerRetailRate
wsp.getoperatorurl=http://localhost/mock/wsp/queryOperator
wsp.getQueryTransactionUrl=http://localhost/mock/wsp/status
wsp.getValidateBillUrl=http://localhost/mock/wsp/validateBill

# ========================
# MMPAYMENT / Dummy URLs
# ========================
mmGetTokenUrl=http://localhost/mock/mmpay/token
mmPaymentUrl=http://localhost/mock/mmpay/pay
mmValidateUrl=http://localhost/mock/mmpay/otpresponse
mmResendOtpUrl=http://localhost/mock/mmpay/otpresend
mmPaymentStatusUrl=http://localhost/mock/mmpay/paystatus
mmRefundPaymentUrl=http://localhost/mock/mmpay/refund
pass=dummy-pass
key=dummy-key
host=localhost

# ========================
# BWALLET Dummy Keys
# ========================
BWALLET_PAYMENT_URL=http://localhost/mock/bwallet
BWALLET_PAYMENT_PUBLIC_KEY=dummy
BWALLET_PAYMENT_PRIVATE_KEY=dummy
BWALLET_PAYMENT_PUBLIC_KEY_DOMES=dummy
BWALLET_PAYMENT_PRIVATE_KEY_DOMES=dummy
BWALLET_PAYMENT_PUBLIC_KEY_UTILITY=dummy
BWALLET_PAYMENT_PRIVATE_KEY_UTILITY=dummy
BWALLET_PAYMENT_PUBLIC_KEY_VOUCHER=dummy
BWALLET_PAYMENT_PRIVATE_KEY_VOUCHER=dummy
BWALLET_PAYMENT_PUBLIC_KEY_ENTERTAINMENT=dummy
BWALLET_PAYMENT_PRIVATE_KEY_ENTERTAINMENT=dummy

# ========================
# ORDER_SERVICE
# ========================
orderUrl=http://localhost/mock/order-service

# ========================
# UMG
# ========================
umgUser=test
umgPassword=test
umgSenderAddress=test
umgUrl=http://localhost/mock/umg

# ========================
# Email (Dummy)
# ========================
spring.mail.host=localhost
spring.mail.port=1025
spring.mail.username=test@test.com
spring.mail.password=test
spring.mail.properties.mail.smtp.auth=false
spring.mail.properties.mail.smtp.starttls.enable=false
spring.mail.properties.mail.smtp.socketFactory.port=1025
spring.mail.properties.mail.smtp.socketFactory.class=jakarta.net.ssl.SSLSocketFactory

# ========================
# Security / Misc
# ========================
central.auth.service.secretString=dummy-secret
useSwagger=false
allowed.origins=http://localhost:4200,http://localhost:8100
fraudToken=dummy-fraud-token
channel.name=test
sms.brand=test

# ========================
# Spring MVC
# ========================
spring.mvc.pathmatch.matching-strategy=ANT_PATH_MATCHER
